#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "wanderer"
name = "Wanderer"
description.en = "Self-hosted trail database. Save your adventures! "
description.fr = "Base de données de trails auto-hébergée. Sauvegardez vos aventures !"

version = "0.19.0~ynh3"

maintainers = ["Thovi98"]

[upstream]
license = "AGPL-3.0"
website = "https://wanderer.to/"
demo = "https://demo.wanderer.to/"
admindoc = "https://wanderer.to/getting-started/installation/"
userdoc = "https://wanderer.to/"
code = "https://github.com/open-wanderer/wanderer"
fund = "https://buymeacoffee.com/wanderertrails"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = false
sso = false

disk = "1G"
ram.build = "2G"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"
    
    [install.admin]
    type = "user"
    help.en = "You will be able to login for admin stuffs with the email of this user and the password you’ll set below."
    help.fr = "Vous pourrez vous connecter pour les tâches d’administrateur avec l’adresse courriel de cet utilisateur et le mot de passe configuré ci-dessous."

    [install.password]
    help.en = "Choose a password for your admin user here."
    help.fr = "Choisissez un mot de passe pour l’utilisateur admin ici."
    type = "password"

    [install.disable_signup]
    ask.en = "Enable sign up?"
    ask.fr = "Autoriser les inscriptions ?"
    type = "boolean"

    [install.private]
    ask.en = "Make the instance private?"
    ask.fr = "Rendre l’instance privée ?"
    help.en = "Setting this to true will block visitors from viewing content without an account"
    type = "boolean"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/open-wanderer/wanderer/archive/refs/tags/v0.19.1.tar.gz"
    sha256 = "c8cf03db27b18b0166a3403d4ede4fc85d528457ba6516cce6aa4ce91f6c1132"
    autoupdate.strategy = "latest_github_tag"

    [resources.sources.meili]
    amd64.url = "https://github.com/meilisearch/meilisearch/releases/download/v1.44.0/meilisearch-linux-amd64"
    amd64.sha256 = "81b2a0870d514b33bff688b046633e127185f4f84599c28279606180798da3d4"
    arm64.url = "https://github.com/meilisearch/meilisearch/releases/download/v1.44.0/meilisearch-linux-aarch64"
    arm64.sha256 = "1d428f21478654af381ebf5278f77bb4123b7e712db2441254ba9660990f8fef"
    rename = "meilisearch"
    in_subdir = false
    extract = false

    autoupdate.strategy = "latest_github_release"
    autoupdate.upstream = "https://github.com/meilisearch/meilisearch"
    autoupdate.asset.amd64 = "^meilisearch-linux-amd64$"
    autoupdate.asset.arm64 = "^meilisearch-linux-aarch64$"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]

    [resources.data_dir]
    subdirs = [ "uploads"]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    pocketbase.url = "/admin"
    pocketbase.allowed = "admins"
    pocketbase.show_tile = false
    pocketbase.protected = true
    pocketbase.auth_header = false

    [resources.ports]
    meili.default = 7700
    pocketbase.default = 8090

    [resources.nodejs]
    version = "22"

    [resources.go]
    version = "1.25.0"
